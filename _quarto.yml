project:
  type: website
  output-dir: _site
  resources:
    - site-data/
    - data/
    - assets/

website:
  title: "Tree Network"
  site-url: "https://maple60.github.io/tree-network/"
  repo-url: "https://github.com/maple60/tree-network"
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Network
      - href: data.qmd
        text: Data
  page-footer:
    left: "Tree Network"
    center: "Built with [Quarto](https://quarto.org/)"
    right:
      - icon: github
        href: https://github.com/maple60/tree-network

format:
  html:
    lang: ja
    theme: cosmo
    toc: false
    code-copy: true
    code-link: true
    page-layout: full
    css: assets/tree-network.css
    include-after-body:
      text: |
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script src="assets/tree-network.js"></script>

execute:
  freeze: auto
