project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - browser.qmd
    - sankey.qmd
    - data.qmd
    - references.qmd
    - "docs/**/*.qmd"
    - "species/**/*.qmd"
    - "data/trait_input_candidates_README.md"
  resources:
    - site-data/
    - data/
    - assets/

website:
  title: "Tree Network"
  site-url: "https://maple60.github.io/tree-network/"
  repo-url: "https://github.com/maple60/tree-network"
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Network
      - href: browser.qmd
        text: Browser
      - href: sankey.qmd
        text: Sankey
      - href: data.qmd
        text: Data
      - href: references.qmd
        text: References
      - text: Maintenance
        menu:
          - href: docs/species-pages.qmd
            text: 樹種ページ追加
          - href: docs/tree-network-js.qmd
            text: Network JS
  page-footer:
    left: "Tree Network"
    center: "Built with [Quarto](https://quarto.org/)"
    right:
      - icon: github
        href: https://github.com/maple60/tree-network

format:
  html:
    lang: ja
    theme: cosmo
    toc: false
    code-copy: true
    code-link: true
    page-layout: full
    css: assets/tree-network.css

execute:
  freeze: auto
